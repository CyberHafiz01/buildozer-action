name: Build APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build with Buildozer
        uses: ArtemSBulgakov/buildozer-action@v1
        with:
          buildozer_version: stable
          workdir: test_app

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: My_Application
          path: test_app/bin/*.apk
